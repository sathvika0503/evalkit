name: EvalKit CI

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: pytest -v

      - name: Run EvalKit
        run: python -m evalkit.cli run examples/summarisation.eval.yaml